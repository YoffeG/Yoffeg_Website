<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(237, 144, 116, 0.16), transparent 30%),
          linear-gradient(180deg, #050b11, #0a1521 52%, #07111a);
        font-family: "Outfit", sans-serif;
      }

      .phone {
        width: 390px;
        height: 844px;
        padding: 14px;
        border-radius: 42px;
        background: linear-gradient(180deg, #0d1723, #04080d);
        box-shadow:
          0 36px 80px rgba(0, 0, 0, 0.5),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .screen {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 30px;
        background: #08111a;
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <iframe class="screen" src="http://127.0.0.1:8765" title="Mobile site preview"></iframe>
    </div>
  </body>
</html>
